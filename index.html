<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HI Procurement Tracker</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --surface2: #1a1a1a;
      --border: #2a2a2a;
      --text: #f0f0f0;
      --muted: #888;
      --gold: #c9a84c;
      --gold-light: #e8c96a;

      --status-sourcing-bg: #1a1a2e;
      --status-sourcing-fg: #7b8cde;
      --status-quoting-bg: #1a1a0a;
      --status-quoting-fg: #c9a84c;
      --status-po-bg: #0a1a2e;
      --status-po-fg: #4a9ede;
      --status-production-bg: #1a0a1a;
      --status-production-fg: #c97de8;
      --status-shipped-bg: #0a1a0a;
      --status-shipped-fg: #4ade80;
      --status-delivered-bg: #0a1a0a;
      --status-delivered-fg: #22c55e;
      --status-hold-bg: #1a0a0a;
      --status-hold-fg: #ef4444;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
    }

    /* HEADER */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 24px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo-mark {
      width: 44px;
      height: 44px;
      background: var(--gold);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 18px;
      color: #000;
      letter-spacing: -0.5px;
    }

    .logo-text h1 {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.3px;
    }

    .logo-text p {
      font-size: 13px;
      color: var(--muted);
      margin-top: 2px;
    }

    .header-meta {
      text-align: right;
    }

    .header-meta .project-badge {
      display: inline-block;
      background: var(--gold);
      color: #000;
      font-size: 11px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 4px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .header-meta .last-updated {
      font-size: 12px;
      color: var(--muted);
    }

    /* SUMMARY CARDS */
    .summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 1px;
      background: var(--border);
      border-bottom: 1px solid var(--border);
    }

    .summary-card {
      background: var(--surface);
      padding: 20px 24px;
      text-align: center;
    }

    .summary-card .value {
      font-size: 28px;
      font-weight: 700;
      color: var(--gold);
      line-height: 1;
    }

    .summary-card .label {
      font-size: 12px;
      color: var(--muted);
      margin-top: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* MAIN */
    main {
      padding: 32px;
      max-width: 1400px;
      margin: 0 auto;
    }

    /* FILTER BAR */
    .filter-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .filter-label {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-right: 4px;
    }

    .filter-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .filter-btn:hover, .filter-btn.active {
      background: var(--gold);
      color: #000;
      border-color: var(--gold);
      font-weight: 600;
    }

    /* TABLE */
    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead tr {
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
    }

    th {
      padding: 12px 16px;
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      white-space: nowrap;
    }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }

    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--surface2); }

    td {
      padding: 14px 16px;
      font-size: 14px;
      vertical-align: middle;
    }

    .cell-item { font-weight: 600; color: var(--text); }
    .cell-category { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .cell-vendor { color: var(--muted); }
    .cell-qty { font-weight: 600; text-align: center; }
    .cell-eta { color: var(--muted); font-size: 13px; }
    .cell-po { font-family: monospace; font-size: 12px; color: var(--muted); }
    .cell-notes { font-size: 13px; color: var(--muted); max-width: 220px; }

    /* STATUS BADGES */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
    }

    .status-badge::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
    }

    .status-Sourcing     { background: var(--status-sourcing-bg);    color: var(--status-sourcing-fg); }
    .status-Quoting      { background: var(--status-quoting-bg);     color: var(--status-quoting-fg); }
    .status-PO-Issued    { background: var(--status-po-bg);          color: var(--status-po-fg); }
    .status-In-Production{ background: var(--status-production-bg);  color: var(--status-production-fg); }
    .status-Shipped      { background: var(--status-shipped-bg);     color: var(--status-shipped-fg); }
    .status-Delivered    { background: var(--status-delivered-bg);   color: var(--status-delivered-fg); }
    .status-On-Hold      { background: var(--status-hold-bg);        color: var(--status-hold-fg); }

    /* PROGRESS BAR */
    .progress-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 24px;
      margin-bottom: 20px;
    }

    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .progress-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }

    .progress-pct {
      font-size: 13px;
      color: var(--gold);
      font-weight: 700;
    }

    .progress-bar-bg {
      background: var(--surface2);
      border-radius: 4px;
      height: 8px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--gold), var(--gold-light));
      border-radius: 4px;
      transition: width 0.6s ease;
    }

    /* LEGEND */
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 12px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--muted);
    }

    .legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    /* EMPTY STATE */
    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--muted);
    }

    .empty-state .icon { font-size: 32px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 24px;
      font-size: 12px;
      color: var(--muted);
      border-top: 1px solid var(--border);
      margin-top: 40px;
    }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      header { padding: 16px 20px; }
      main { padding: 20px 16px; }
      th, td { padding: 10px 12px; }
      .cell-notes { display: none; }
      .cell-po { display: none; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo-area">
    <div class="logo-mark">HI</div>
    <div class="logo-text">
      <h1>Higney International</h1>
      <p>FF&amp;E Procurement Tracker</p>
    </div>
  </div>
  <div class="header-meta">
    <div class="project-badge" id="projectBadge">Loading...</div>
    <div class="last-updated" id="lastUpdated"></div>
  </div>
</header>

<div class="summary" id="summaryCards"></div>

<main>
  <!-- PROGRESS -->
  <div class="progress-section">
    <div class="progress-header">
      <span class="progress-title">Overall Delivery Progress</span>
      <span class="progress-pct" id="progressPct">0%</span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
    </div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#7b8cde"></div>Sourcing</div>
      <div class="legend-item"><div class="legend-dot" style="background:#c9a84c"></div>Quoting</div>
      <div class="legend-item"><div class="legend-dot" style="background:#4a9ede"></div>PO Issued</div>
      <div class="legend-item"><div class="legend-dot" style="background:#c97de8"></div>In Production</div>
      <div class="legend-item"><div class="legend-dot" style="background:#4ade80"></div>Shipped</div>
      <div class="legend-item"><div class="legend-dot" style="background:#22c55e"></div>Delivered</div>
      <div class="legend-item"><div class="legend-dot" style="background:#ef4444"></div>On Hold</div>
    </div>
  </div>

  <!-- FILTER -->
  <div class="filter-bar">
    <span class="filter-label">Filter:</span>
    <button class="filter-btn active" onclick="filterTable('All')">All</button>
    <button class="filter-btn" onclick="filterTable('Sourcing')">Sourcing</button>
    <button class="filter-btn" onclick="filterTable('Quoting')">Quoting</button>
    <button class="filter-btn" onclick="filterTable('PO Issued')">PO Issued</button>
    <button class="filter-btn" onclick="filterTable('In Production')">In Production</button>
    <button class="filter-btn" onclick="filterTable('Shipped')">Shipped</button>
    <button class="filter-btn" onclick="filterTable('Delivered')">Delivered</button>
  </div>

  <!-- TABLE -->
  <div class="table-wrap">
    <table id="itemTable">
      <thead>
        <tr>
          <th>#</th>
          <th>Item</th>
          <th>Vendor</th>
          <th style="text-align:center">Qty</th>
          <th>Status</th>
          <th>ETA</th>
          <th>PO #</th>
          <th>Notes</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr><td colspan="8"><div class="empty-state"><div class="icon">📦</div><p>Loading items...</p></div></td></tr>
      </tbody>
    </table>
  </div>
</main>

<footer>
  Higney International &mdash; Confidential Client Report &mdash; <span id="footerProject"></span>
</footer>

<script>
  const STATUS_ORDER = ['Sourcing','Quoting','PO Issued','In Production','Shipped','Delivered','On Hold'];
  const DELIVERED_WEIGHT = { 'Sourcing':0,'Quoting':0.2,'PO Issued':0.4,'In Production':0.6,'Shipped':0.8,'Delivered':1,'On Hold':0 };

  let allItems = [];
  let currentFilter = 'All';

  async function loadData() {
    // Determine project from URL param or default
    const params = new URLSearchParams(window.location.search);
    const project = params.get('project') || 'metro-lagoons';

    try {
      const res = await fetch(`data/${project}.json?t=${Date.now()}`);
      const data = await res.json();
      renderPage(data);
    } catch(e) {
      document.getElementById('tableBody').innerHTML =
        '<tr><td colspan="8"><div class="empty-state"><div class="icon">⚠️</div><p>Could not load project data.</p></div></td></tr>';
    }
  }

  function renderPage(data) {
    // Header
    document.title = `${data.project} — HI Tracker`;
    document.getElementById('projectBadge').textContent = data.project;
    document.getElementById('lastUpdated').textContent = `Updated: ${formatDate(data.lastUpdated)}`;
    document.getElementById('footerProject').textContent = data.project;

    allItems = data.items || [];

    // Summary cards
    renderSummary(allItems);

    // Progress
    renderProgress(allItems);

    // Table
    renderTable(allItems);
  }

  function renderSummary(items) {
    const total = items.length;
    const totalQty = items.reduce((s,i) => s + (i.qty||0), 0);
    const delivered = items.filter(i => i.status === 'Delivered').length;
    const inFlight = items.filter(i => ['Shipped','In Production','PO Issued'].includes(i.status)).length;
    const pending = items.filter(i => ['Sourcing','Quoting'].includes(i.status)).length;

    const cards = [
      { value: total, label: 'Line Items' },
      { value: totalQty, label: 'Total Units' },
      { value: pending, label: 'Pending' },
      { value: inFlight, label: 'In Progress' },
      { value: delivered, label: 'Delivered' },
    ];

    document.getElementById('summaryCards').innerHTML = cards.map(c =>
      `<div class="summary-card"><div class="value">${c.value}</div><div class="label">${c.label}</div></div>`
    ).join('');
  }

  function renderProgress(items) {
    if (!items.length) return;
    const score = items.reduce((s,i) => s + (DELIVERED_WEIGHT[i.status]||0), 0);
    const pct = Math.round((score / items.length) * 100);
    document.getElementById('progressPct').textContent = pct + '%';
    document.getElementById('progressFill').style.width = pct + '%';
  }

  function renderTable(items) {
    const filtered = currentFilter === 'All' ? items : items.filter(i => i.status === currentFilter);

    if (!filtered.length) {
      document.getElementById('tableBody').innerHTML =
        '<tr><td colspan="8"><div class="empty-state"><div class="icon">🔍</div><p>No items match this filter.</p></div></td></tr>';
      return;
    }

    document.getElementById('tableBody').innerHTML = filtered.map(item => {
      const statusClass = 'status-' + (item.status||'').replace(/\s+/g,'-');
      return `<tr>
        <td style="color:var(--muted);font-size:12px">${item.id}</td>
        <td>
          <div class="cell-item">${item.item}</div>
          ${item.category ? `<div class="cell-category">${item.category}</div>` : ''}
        </td>
        <td class="cell-vendor">${item.vendor || '—'}</td>
        <td class="cell-qty">${item.qty || '—'}</td>
        <td><span class="status-badge ${statusClass}">${item.status}</span></td>
        <td class="cell-eta">${item.eta || '—'}</td>
        <td class="cell-po">${item.poNumber || '—'}</td>
        <td class="cell-notes">${item.notes || '—'}</td>
      </tr>`;
    }).join('');
  }

  function filterTable(status) {
    currentFilter = status;
    document.querySelectorAll('.filter-btn').forEach(b => {
      b.classList.toggle('active', b.textContent === status || (status === 'All' && b.textContent === 'All'));
    });
    renderTable(allItems);
  }

  function formatDate(str) {
    if (!str) return '';
    const d = new Date(str + 'T00:00:00');
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  loadData();
</script>
</body>
</html>
