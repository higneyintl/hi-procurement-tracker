<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HI Procurement Tracker</title>
  <style>
    :root {
      --bg: #f4f5f7;
      --surface: #ffffff;
      --surface2: #f8f9fa;
      --border: #e2e5e9;
      --text: #1a1d23;
      --text2: #4a5568;
      --muted: #8a95a3;
      --gold: #b8862a;
      --gold-bg: #fdf6e8;
      --gold-border: #e8c97a;

      --s-sourcing:      #e8f0fe; --s-sourcing-fg:    #3b5bdb; --s-sourcing-bd:   #a5b4fc;
      --s-quoting:       #fff8e1; --s-quoting-fg:     #b7791f; --s-quoting-bd:    #f6c84a;
      --s-approved:      #e6f9f0; --s-approved-fg:    #1a7f4b; --s-approved-bd:   #6ee7b7;
      --s-finishes:      #fff3e0; --s-finishes-fg:    #c05621; --s-finishes-bd:   #fca97a;
      --s-drawings:      #f3e8ff; --s-drawings-fg:    #6b21a8; --s-drawings-bd:   #d8b4fe;
      --s-production:    #e0f2fe; --s-production-fg:  #0369a1; --s-production-bd: #7dd3fc;
      --s-design:        #fce7f3; --s-design-fg:      #9d174d; --s-design-bd:     #f9a8d4;
      --s-sandbar:       #ede9fe; --s-sandbar-fg:     #5b21b6; --s-sandbar-bd:    #c4b5fd;
      --s-multiple:      #f1f5f9; --s-multiple-fg:    #475569; --s-multiple-bd:   #cbd5e1;
      --s-shipped:       #dcfce7; --s-shipped-fg:     #15803d; --s-shipped-bd:    #86efac;
      --s-delivered:     #d1fae5; --s-delivered-fg:   #065f46; --s-delivered-bd:  #6ee7b7;
      --s-hold:          #fee2e2; --s-hold-fg:        #b91c1c; --s-hold-bd:       #fca5a5;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
      min-height: 100vh;
      font-size: 14px;
    }

    /* ── HEADER ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 1px 3px rgba(0,0,0,.06);
    }

    .logo-area { display: flex; align-items: center; gap: 12px; }

    .logo-mark {
      width: 38px; height: 38px;
      background: var(--gold);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 15px; color: #fff; letter-spacing: -0.5px;
    }

    .logo-text h1 { font-size: 16px; font-weight: 700; color: var(--text); }
    .logo-text p  { font-size: 12px; color: var(--muted); margin-top: 1px; }

    .header-right { display: flex; align-items: center; gap: 12px; }

    .project-badge {
      background: var(--gold-bg);
      border: 1px solid var(--gold-border);
      color: var(--gold);
      font-size: 12px; font-weight: 700;
      padding: 4px 10px; border-radius: 6px;
      letter-spacing: 0.3px;
    }

    .last-updated { font-size: 12px; color: var(--muted); }

    /* ── SUMMARY STRIP ── */
    .summary {
      display: flex;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
    }

    .summary-card {
      flex: 1; min-width: 120px;
      padding: 16px 24px;
      text-align: center;
      border-right: 1px solid var(--border);
    }
    .summary-card:last-child { border-right: none; }

    .summary-card .val {
      font-size: 26px; font-weight: 700;
      color: var(--gold); line-height: 1;
    }
    .summary-card .lbl {
      font-size: 11px; color: var(--muted);
      margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px;
    }

    /* ── MAIN ── */
    main { padding: 24px 32px; max-width: 1440px; margin: 0 auto; }

    /* ── PROGRESS ── */
    .progress-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px 22px;
      margin-bottom: 18px;
    }

    .progress-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 10px;
    }

    .progress-title { font-size: 13px; font-weight: 600; color: var(--text2); }
    .progress-pct   { font-size: 14px; font-weight: 700; color: var(--gold); }

    .progress-bg {
      background: var(--bg);
      border-radius: 6px; height: 8px; overflow: hidden;
      border: 1px solid var(--border);
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--gold), #e8a93a);
      border-radius: 6px;
      transition: width .6s ease;
    }

    .legend {
      display: flex; flex-wrap: wrap; gap: 10px; margin-top: 12px;
    }
    .legend-item {
      display: flex; align-items: center; gap: 5px;
      font-size: 11px; color: var(--muted);
    }
    .legend-dot { width: 7px; height: 7px; border-radius: 50%; }

    /* ── TOOLBAR ── */
    .toolbar {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 14px; flex-wrap: wrap;
    }

    .filter-label {
      font-size: 11px; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.5px;
      margin-right: 2px;
    }

    .filter-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text2);
      padding: 5px 13px;
      border-radius: 6px; font-size: 12px; font-weight: 500;
      cursor: pointer; transition: all .15s;
      white-space: nowrap;
    }
    .filter-btn:hover { border-color: var(--gold); color: var(--gold); }
    .filter-btn.active {
      background: var(--gold); color: #fff;
      border-color: var(--gold); font-weight: 600;
    }

    /* ── SORTABLE HEADERS ── */
    th.sortable {
      cursor: pointer; user-select: none;
      white-space: nowrap;
    }
    th.sortable:hover { color: var(--gold); }
    th.sortable.asc, th.sortable.desc { color: var(--gold); }
    .sort-icon { font-style: normal; font-size: 10px; margin-left: 3px; opacity: 0.5; }
    th.sortable.asc  .sort-icon::after { content: '▲'; opacity: 1; }
    th.sortable.desc .sort-icon::after { content: '▼'; opacity: 1; }
    th.sortable:not(.asc):not(.desc) .sort-icon::after { content: '⇅'; }

    /* ── TABLE ── */
    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    table { width: 100%; border-collapse: collapse; }

    thead tr {
      background: var(--surface2);
      border-bottom: 2px solid var(--border);
    }

    th {
      padding: 10px 14px;
      text-align: left;
      font-size: 11px; font-weight: 600;
      color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.5px;
      white-space: nowrap;
    }

    tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #fafbfc; }

    td { padding: 12px 14px; vertical-align: middle; }

    .cell-num { color: var(--muted); font-size: 12px; font-weight: 500; }
    .cell-item-name { font-weight: 600; color: var(--text); line-height: 1.3; }
    .cell-areas {
      display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px;
    }
    .area-tag {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text2);
      font-size: 10px; padding: 1px 6px; border-radius: 4px;
    }
    .cell-vendor { color: var(--text2); font-size: 13px; }
    .cell-qty { font-weight: 700; color: var(--text); text-align: center; }
    .cell-eta { color: var(--text2); font-size: 13px; white-space: nowrap; }
    .cell-notes { color: var(--muted); font-size: 12px; max-width: 200px; line-height: 1.4; }

    /* ── STATUS BADGES ── */
    .badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 9px; border-radius: 20px;
      font-size: 11px; font-weight: 600;
      border: 1px solid transparent;
      white-space: nowrap;
    }
    .badge::before {
      content: ''; width: 5px; height: 5px;
      border-radius: 50%; background: currentColor; flex-shrink: 0;
    }

    .badge-Sourcing            { background: var(--s-sourcing);    color: var(--s-sourcing-fg);    border-color: var(--s-sourcing-bd); }
    .badge-Quoting             { background: var(--s-quoting);     color: var(--s-quoting-fg);     border-color: var(--s-quoting-bd); }
    .badge-Selection-Approved  { background: var(--s-approved);    color: var(--s-approved-fg);    border-color: var(--s-approved-bd); }
    .badge-Finishes-Pending    { background: var(--s-finishes);    color: var(--s-finishes-fg);    border-color: var(--s-finishes-bd); }
    .badge-Shop-Drawings-Stage { background: var(--s-drawings);    color: var(--s-drawings-fg);    border-color: var(--s-drawings-bd); }
    .badge-In-Production       { background: var(--s-production);  color: var(--s-production-fg);  border-color: var(--s-production-bd); }
    .badge-Design-Pending-Approval { background: var(--s-design); color: var(--s-design-fg);      border-color: var(--s-design-bd); }
    .badge-Multiple            { background: var(--s-multiple);    color: var(--s-multiple-fg);    border-color: var(--s-multiple-bd); }
    .badge-Shipped             { background: var(--s-shipped);     color: var(--s-shipped-fg);     border-color: var(--s-shipped-bd); }
    .badge-Delivered           { background: var(--s-delivered);   color: var(--s-delivered-fg);   border-color: var(--s-delivered-bd); }
    .badge-On-Hold             { background: var(--s-hold);        color: var(--s-hold-fg);        border-color: var(--s-hold-bd); }
    .badge-Sandbar-Upstairs-Design-Pending-Approval { background: var(--s-sandbar); color: var(--s-sandbar-fg); border-color: var(--s-sandbar-bd); }

    /* ── EMPTY STATE ── */
    .empty {
      text-align: center; padding: 48px 24px;
      color: var(--muted);
    }
    .empty .icon { font-size: 28px; margin-bottom: 10px; }

    /* ── FOOTER ── */
    footer {
      text-align: center; padding: 24px;
      font-size: 12px; color: var(--muted);
      border-top: 1px solid var(--border);
      margin-top: 32px;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      header { padding: 0 16px; }
      main { padding: 16px; }
      th, td { padding: 10px 10px; }
      .cell-notes { display: none; }
      .cell-areas { display: none; }
      .summary-card { min-width: 90px; padding: 12px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo-area">
    <div class="logo-mark">HI</div>
    <div class="logo-text">
      <h1>Higney International</h1>
      <p>FF&amp;E Procurement Tracker</p>
    </div>
  </div>
  <div class="header-right">
    <div class="project-badge" id="projectBadge">—</div>
    <div class="last-updated" id="lastUpdated"></div>
  </div>
</header>

<div class="summary" id="summaryStrip"></div>

<main>
  <div class="progress-card">
    <div class="progress-header">
      <span class="progress-title">Overall Delivery Progress</span>
      <span class="progress-pct" id="progressPct">—</span>
    </div>
    <div class="progress-bg">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
    <div class="legend" id="legend"></div>
  </div>

  <div class="toolbar" id="filterBar">
    <span class="filter-label">Filter:</span>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th onclick="sortBy('id')"     class="sortable">#     <span class="sort-icon" id="si-id"></span></th>
          <th onclick="sortBy('vendor')" class="sortable">Vendor <span class="sort-icon" id="si-vendor"></span></th>
          <th onclick="sortBy('item')"   class="sortable">Item   <span class="sort-icon" id="si-item"></span></th>
          <th onclick="sortBy('qty')"    class="sortable" style="text-align:center">Qty <span class="sort-icon" id="si-qty"></span></th>
          <th onclick="sortBy('status')" class="sortable">Status <span class="sort-icon" id="si-status"></span></th>
          <th onclick="sortBy('datePaid')" class="sortable">Date Vendor Paid <span class="sort-icon" id="si-datePaid"></span></th>
          <th onclick="sortBy('eta')"    class="sortable">ETA    <span class="sort-icon" id="si-eta"></span></th>
          <th>Notes</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr><td colspan="7"><div class="empty"><div class="icon">⏳</div><p>Loading...</p></div></td></tr>
      </tbody>
    </table>
  </div>
</main>

<footer>
  Higney International &mdash; Confidential &mdash; <span id="footerProject"></span>
</footer>

<script>
const SHEET_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS5iTpo-7KLLFZa4sUt4ADiiy9Qy7Lfoo-Xnx9RGOipsKPtv8lvKlG60Lb_X0dZjfyrF_xo7BJE34MM/pub?gid=747201363&single=true&output=csv';

const WEIGHT = {
  'Sourcing': 0, 'Quoting': 0.1, 'Design Pending Approval': 0.15,
  'Sandbar Upstairs Design Pending Approval': 0.15,
  'Finishes Pending': 0.25, 'Selection Approved': 0.35,
  'Shop Drawings Stage': 0.5, 'In Production': 0.65,
  'Multiple': 0.3, 'Shipped': 0.85, 'Delivered': 1, 'On Hold': 0
};

const LEGEND_ITEMS = [
  { label: 'Sourcing',              color: '#3b5bdb' },
  { label: 'Quoting',              color: '#b7791f' },
  { label: 'Selection Approved',   color: '#1a7f4b' },
  { label: 'Finishes Pending',     color: '#c05621' },
  { label: 'Shop Drawings Stage',  color: '#6b21a8' },
  { label: 'In Production',        color: '#0369a1' },
  { label: 'Design Pending',       color: '#9d174d' },
  { label: 'Sandbar Upstairs Design Pending', color: '#5b21b6' },
  { label: 'Shipped',              color: '#15803d' },
  { label: 'Delivered',            color: '#065f46' },
];

let allItems = [], currentFilter = 'All', sortKey = null, sortDir = 1;

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',');
  const items = [];
  for (let i = 1; i < lines.length; i++) {
    // Handle quoted fields
    const cols = [];
    let cur = '', inQ = false;
    for (const ch of lines[i]) {
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
      else { cur += ch; }
    }
    cols.push(cur.trim());
    if (!cols[0]) continue;
    items.push({
      id:       parseInt(cols[0]) || 0,
      vendor:   cols[1] || '',
      item:     cols[2] || '',
      qty:      parseInt(cols[3]) || 0,
      status:   cols[4] || '',
      datePaid: cols[5] || '',
      eta:      cols[6] || '',
      notes:    cols[7] || ''
    });
  }
  return items;
}

async function loadData() {
  try {
    const r = await fetch(SHEET_CSV + '&t=' + Date.now());
    const text = await r.text();
    const items = parseCSV(text);
    render({
      project: 'Metro Lagoons',
      subtitle: 'Project Seaire — Parrish, FL',
      lastUpdated: new Date().toISOString().slice(0,10),
      items
    });
  } catch(e) {
    document.getElementById('tableBody').innerHTML =
      '<tr><td colspan="7"><div class="empty"><div class="icon">⚠️</div><p>Could not load data.</p></div></td></tr>';
  }
}

function render(data) {
  document.title = `${data.project} — HI Tracker`;
  document.getElementById('projectBadge').textContent = data.project + ' · Seaire';
  document.getElementById('footerProject').textContent = `${data.project} · ${data.subtitle}`;
  document.getElementById('lastUpdated').textContent = `Updated ${fmtDate(data.lastUpdated)}`;

  allItems = data.items || [];

  // Summary
  const total = allItems.length;
  const totalQty = allItems.reduce((s,i) => s + (i.qty||0), 0);
  const delivered = allItems.filter(i => i.status === 'Delivered').length;
  const inProd = allItems.filter(i => ['In Production','Shop Drawings Stage'].includes(i.status)).length;
  const approved = allItems.filter(i => i.status === 'Selection Approved').length;
  const sourcing = allItems.filter(i => ['Sourcing','Quoting'].includes(i.status)).length;

  document.getElementById('summaryStrip').innerHTML = [
    { v: total,    l: 'Line Items' },
    { v: totalQty, l: 'Total Units' },
    { v: sourcing, l: 'Sourcing / Quoting' },
    { v: approved, l: 'Selection Approved' },
    { v: inProd,   l: 'In Progress' },
    { v: delivered,l: 'Delivered' },
  ].map(c => `<div class="summary-card"><div class="val">${c.v}</div><div class="lbl">${c.l}</div></div>`).join('');

  // Progress
  const score = allItems.reduce((s,i) => s + (WEIGHT[i.status] ?? 0.2), 0);
  const pct = allItems.length ? Math.round((score / allItems.length) * 100) : 0;
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('legend').innerHTML = LEGEND_ITEMS.map(l =>
    `<div class="legend-item"><div class="legend-dot" style="background:${l.color}"></div>${l.label}</div>`
  ).join('');

  // Collect statuses in legend order
  const STATUS_ORDER = ['Sourcing','Quoting','Selection Approved','Finishes Pending','Shop Drawings Stage','In Production','Design Pending Approval','Sandbar Upstairs Design Pending Approval','Shipped','Delivered','On Hold'];
  const present = new Set(allItems.map(i => i.status));
  const statuses = STATUS_ORDER.filter(s => present.has(s));
  const bar = document.getElementById('filterBar');
  bar.innerHTML = `<span class="filter-label">Filter:</span>
    <button class="filter-btn active" onclick="applyFilter('All',this)">All</button>
    ${statuses.map(s => `<button class="filter-btn" onclick="applyFilter('${s}',this)">${s}</button>`).join('')}`;

  renderTable();
}

function sortBy(key) {
  if (sortKey === key) { sortDir *= -1; }
  else { sortKey = key; sortDir = 1; }
  // Update header classes
  document.querySelectorAll('th.sortable').forEach(th => th.classList.remove('asc','desc'));
  const map = { id:'id', vendor:'vendor', item:'item', qty:'qty', status:'status', eta:'eta' };
  const th = document.querySelector(`th[onclick="sortBy('${key}')"]`);
  if (th) th.classList.add(sortDir === 1 ? 'asc' : 'desc');
  renderTable();
}

function renderTable() {
  let items = currentFilter === 'All' ? allItems : allItems.filter(i => i.status === currentFilter);
  if (sortKey) {
    items = [...items].sort((a, b) => {
      let av = a[sortKey] ?? '', bv = b[sortKey] ?? '';
      if (sortKey === 'qty') return (av - bv) * sortDir;
      return String(av).localeCompare(String(bv), undefined, {numeric: true}) * sortDir;
    });
  }
  if (!items.length) {
    document.getElementById('tableBody').innerHTML =
      '<tr><td colspan="7"><div class="empty"><div class="icon">🔍</div><p>No items.</p></div></td></tr>';
    return;
  }
  document.getElementById('tableBody').innerHTML = items.map(item => {
    const cls = 'badge-' + (item.status||'').replace(/\s+/g,'-');
    const areas = (item.areas||[]).map(a => `<span class="area-tag">${a}</span>`).join('');
    return `<tr>
      <td class="cell-num">${item.id}</td>
      <td class="cell-vendor">${item.vendor||'—'}</td>
      <td><div class="cell-item-name">${item.item}</div></td>
      <td class="cell-qty">${item.qty != null ? item.qty : '—'}</td>
      <td><span class="badge ${cls}">${item.status}</span></td>
      <td class="cell-eta">${item.datePaid||'—'}</td>
      <td class="cell-eta">${item.eta||'—'}</td>
      <td class="cell-notes">${item.notes||'—'}</td>
    </tr>`;
  }).join('');
}

function applyFilter(status, btn) {
  currentFilter = status;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTable();
}

function fmtDate(s) {
  if (!s) return '';
  const d = new Date(s + 'T00:00:00');
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

loadData();
</script>
</body>
</html>
